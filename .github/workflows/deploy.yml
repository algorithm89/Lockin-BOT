name: Deploy LockIn Bot

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, lockinbot]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}" >> .env
          echo "TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}" >> .env
          echo "TWILIO_PHONE_NUMBER=${{ secrets.TWILIO_PHONE_NUMBER }}" >> .env
          echo "MY_PHONE_NUMBER=${{ secrets.MY_PHONE_NUMBER }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env

      - name: Deploy
        run: |
          docker compose down || true
          docker compose up -d --build

      - name: Test connections
        run: |
          sleep 5
          docker exec lockinbot python test_connections.py

      - name: Set Telegram webhook
        run: |
          TOKEN=$(grep TELEGRAM_BOT_TOKEN .env 2>/dev/null | cut -d= -f2 || echo "")
          BASE=$(grep BASE_URL .env 2>/dev/null | cut -d= -f2 || echo "")
          if [ -n "$TOKEN" ] && [ -n "$BASE" ]; then
            curl -s "https://api.telegram.org/bot${TOKEN}/setWebhook?url=${BASE}/telegram&drop_pending_updates=true"
            echo ""
            echo "Telegram webhook set"
          fi

      - name: Cleanup .env
        if: always()
        run: rm -f .env

      - name: Show logs
        run: docker logs lockinbot --tail 20
